name: Weekly fresh data

# Scrapes each bank source, extracts changed banks with Claude, and commits the
# updated data/*.json so Vercel auto-deploys.
# - Weekly cron runs ALL banks automatically.
# - Manual run (Actions tab -> "Weekly fresh data" -> Run workflow) optionally scopes to
#   specific banks via the "only_banks" input (comma-separated bankIds); empty = all banks.
# Requires the ANTHROPIC_API_KEY repo secret. Check the diff + data/refresh-report.json after a run.

on:
  workflow_dispatch:
    inputs:
      only_banks:
        description: "Comma-separated bankIds to run (e.g. peoples-bank,boc). Leave empty to run ALL banks."
        required: false
        default: ""
      sanity_override:
        description: "Comma-separated bankIds allowed to bypass the sanity gate (accept a big offer-count drop)."
        required: false
        default: ""
  # Runs automatically every Monday at 02:00 UTC (always all banks; inputs only apply to manual runs):
  schedule:
    - cron: "0 2 * * 1"

# Prevent overlapping runs from racing on the committed data files.
concurrency:
  group: refresh-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Browsers for the dynamic_page source type (only used if a bank is set to it).
      - run: npx playwright install --with-deps chromium

      - name: Refresh offers
        id: refresh
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Empty on schedule runs -> all banks. Set via "Run workflow" inputs to scope a manual run.
          ONLY_BANKS: ${{ github.event.inputs.only_banks }}
          SANITY_OVERRIDE: ${{ github.event.inputs.sanity_override }}
        run: npm run refresh:fresh

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            MSG="chore(data): weekly offer refresh"
            if [ "${{ steps.refresh.outcome }}" = "failure" ]; then
              MSG="chore(data): weekly offer refresh [partial — some banks failed, see refresh-report.json]"
            fi
            git commit -m "$MSG"
            git push
          fi

      # Fail the run (and notify via GitHub) if any bank failed, after the good data was committed.
      - name: Surface failures
        if: steps.refresh.outcome == 'failure'
        run: |
          echo "One or more banks failed — see data/refresh-report.json in the latest commit."
          exit 1
